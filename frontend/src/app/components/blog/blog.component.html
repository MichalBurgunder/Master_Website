  <!-- Articles Section -->
  <section>
    <h2 class="section-title">365 Days of Computer</h2>
    <hr class="section-divider">

    <!-- Category Filter -->
    <!-- <div class="d-flex flex-wrap gap-2 mb-4">
      <button
        class="btn btn-sm"
        [class.btn-primary]="selectedCategoryId === null"
        [class.btn-outline-primary]="selectedCategoryId !== null"

        All
      </button>
      <button

        [class.btn-outline-primary]="selectedCategoryId !== cat.id"

        {{ cat.name }}
      </button>

    <!-- Empty State -->
    <div *ngIf="!loading && articles.length === 0" class="text-center py-5 text-muted">
      <p class="fs-5">No articles yet. Check back soon!</p>
    </div>

    <!-- Article Cards -->
    <div class="row g-4" *ngIf="!loading && articles.length > 0">
      <div class="col-md-6 col-lg-4" *ngFor="let article of articles">
        <div class="card h-100 shadow-sm border-0 cursor-pointer" (click)="openArticle(article.id)">
          <img
            *ngIf="article.imageUrl"
            [src]="article.imageUrl"
            class="card-img-top"
            [alt]="article.title"
            style="height:180px; object-fit:cover;">
          <div class="card-body d-flex flex-column">
            <span class="badge bg-primary mb-2 align-self-start">{{ article.category.name }}</span>
            <h5 class="card-title fw-bold">{{ article.title }}</h5>
            <p class="card-text text-muted flex-grow-1" *ngIf="article.summary">{{ article.summary }}</p>
            <small class="text-muted mt-2">{{ formatDate(article.createdAt) }}</small>
          </div>
        </div>
      </div>
    </div>
  </section>

</div>
